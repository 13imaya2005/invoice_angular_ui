<div class="vendor-form-small" style="margin:20px">
  <h3>{{ isEdit ? "Edit Vendor" : "Create Vendor" }}</h3>

  <mat-dialog-content>
    <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="form">

      <!-- Vendor Code -->
      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Vendor Code</mat-label>
          <input matInput formControlName="vendorCode" appSelectOnFocus />
          <mat-error *ngIf="(isSubmitted || f['vendorCode'].touched) && f['vendorCode'].errors?.['required']">
            Vendor Code is required
          </mat-error>
        </mat-form-field>
      </div>

      <!-- Vendor Name -->
      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Vendor Name</mat-label>
          <input matInput formControlName="vendorName" appSelectOnFocus />
          <mat-error *ngIf="(isSubmitted || f['vendorName'].touched) && f['vendorName'].errors?.['required']">
            Vendor Name is required
          </mat-error>
        </mat-form-field>
      </div>

      <!-- Contact Person -->
      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Contact Person</mat-label>
          <input matInput formControlName="contactPerson" />
        </mat-form-field>
      </div>

      <!-- Mobile -->
      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Mobile No</mat-label>
          <input matInput formControlName="mobileNo" />
        </mat-form-field>
      </div>

      <!-- Email -->
      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" />
        </mat-form-field>
      </div>

      <!-- Address1 -->
      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Address 1</mat-label>
          <textarea matInput rows="2" formControlName="address1"></textarea>
        </mat-form-field>
      </div>

      <!-- Address2 -->
      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Address 2</mat-label>
          <textarea matInput rows="2" formControlName="address2"></textarea>
        </mat-form-field>
      </div>

      <!-- City -->
      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>City</mat-label>
          <input matInput formControlName="city" />
        </mat-form-field>
      </div>

      <!-- State -->
      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>State</mat-label>
          <input matInput formControlName="state" />
        </mat-form-field>
      </div>

      <!-- Country -->
      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Country</mat-label>
          <input matInput formControlName="country" />
        </mat-form-field>
      </div>

      <!-- Zip Code -->
      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>Zip Code</mat-label>
          <input matInput formControlName="zipCode" />
        </mat-form-field>
      </div>

      <!-- GST No -->
      <div class="form-field">
        <mat-form-field appearance="outline" style="width:50%">
          <mat-label>GST No</mat-label>
          <input matInput formControlName="gstNo" />
        </mat-form-field>
      </div>

      <!-- Is Active -->
      <div class="form-field">
        <mat-label>Is Active?</mat-label>
        <mat-radio-group formControlName="isActive">
          <mat-radio-button [value]="true" color="primary">
            Active
          </mat-radio-button>

          <mat-radio-button [value]="false" color="warn">
            Inactive
          </mat-radio-button>
        </mat-radio-group>
      </div>

      <br>

      <!-- Buttons -->
      <button mat-flat-button color="primary" type="submit">
        {{ isEdit ? "Update" : "Save" }}
      </button>

      <button
        mat-stroked-button
        type="button"
        (click)="dialogRef.close()"
        style="margin-left:10px">
        Cancel
      </button>

    </form>
  </mat-dialog-content>
</div>
